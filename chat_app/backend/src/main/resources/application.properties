spring.application.name=app

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chat_app}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode= never
spring.sql.init.encoding=UTF-8

server.address=0.0.0.0
server.port=8080

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Comma-separated list. Override in environment for production.
app.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:3000,http://localhost:4200,https://*.z7.web.core.windows.net,https://*.azurewebsites.net
