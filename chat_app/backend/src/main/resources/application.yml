server:
  servlet:
    context-path:

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chat_app?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      encoding: UTF-8

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

# JWT Config
jwt:
  signer-key: ${JWT_SIGNER_KEY:CHANGE_ME_USE_ENV_FOR_JWT_SIGNER_KEY}
  issuer: ${JWT_ISSUER:chat-app}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}

auth:
  refresh-cookie:
    name: ${AUTH_REFRESH_COOKIE_NAME:refresh_token}
    path: ${AUTH_REFRESH_COOKIE_PATH:/}
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
    same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
  reset-token:
    secret: ${RESET_TOKEN_SECRET:CHANGE_ME_USE_ENV_FOR_RESET_TOKEN_SECRET}
    expiration-ms: ${RESET_TOKEN_EXPIRATION_MS:180000}

# Cloud
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  upload-preset: ${CLOUDINARY_UPLOAD_PRESET:}
  upload-folder: ${CLOUDINARY_UPLOAD_FOLDER:chat_images}

google:
  oauth:
    # Prefer backend variable; fallback to frontend naming to avoid misconfiguration across environments.
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:${GOOGLE_WEB_CLIENT_ID:xxx.apps.googleusercontent.com}}

app:
  read-model-events:
    enabled: ${READ_MODEL_EVENTS_ENABLED:false}
    exchange: ${READ_MODEL_EVENTS_EXCHANGE:fookbase.domain.events}
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "http://192.168.1.*:*"
  websocket:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "http://192.168.1.*:*"




