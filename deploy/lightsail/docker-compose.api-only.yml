name: fookbase-api

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.api-gateway
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
    depends_on:
      - csharp-api
      - java-api
    restart: unless-stopped

  csharp-api:
    build:
      context: ../../backend
      dockerfile: fookbase.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Security__EnableHttpsRedirection: "${C_SHARP_ENABLE_HTTPS_REDIRECTION:-false}"
      ConnectionStrings__AppDbConnection: "${C_SHARP_DB_CONNECTION}"
      JavaApi__BaseUrl: "http://java-api:8080/api"
      JWT_SECRET_KEY: "${C_SHARP_JWT_SECRET_KEY}"
      Database__MigrateOnStartup: "true"
      Database__FailFastOnMigrationError: "true"
      RabbitMqReadModel__Enabled: "${READ_MODEL_CONSUMER_ENABLED:-false}"
      RabbitMqReadModel__HostName: "${RABBITMQ_HOST:-localhost}"
      RabbitMqReadModel__Port: "${RABBITMQ_PORT:-5672}"
      RabbitMqReadModel__VirtualHost: "${RABBITMQ_VIRTUAL_HOST:-/}"
      RabbitMqReadModel__UserName: "${RABBITMQ_USERNAME:-guest}"
      RabbitMqReadModel__Password: "${RABBITMQ_PASSWORD:-guest}"
      RabbitMqReadModel__ExchangeName: "${READ_MODEL_EXCHANGE:-fookbase.domain.events}"
      RabbitMqReadModel__QueueName: "${READ_MODEL_QUEUE_NAME:-fookbase.read-model.csharp}"
      RabbitMqReadModel__PrefetchCount: "${READ_MODEL_PREFETCH_COUNT:-32}"
      Cors__AllowedOrigins__0: "${APP_ORIGIN}"
      Cloudinary__CloudName: "${CLOUDINARY_CLOUD_NAME:-}"
      Cloudinary__ApiKey: "${CLOUDINARY_API_KEY:-}"
      Cloudinary__ApiSecret: "${CLOUDINARY_API_SECRET:-}"
      Cloudinary__UploadPreset: "${CLOUDINARY_UPLOAD_PRESET:-}"
      Cloudinary__UploadFolder: "${CLOUDINARY_UPLOAD_FOLDER:-fookbase/posts}"
    expose:
      - "8081"
    restart: unless-stopped

  java-api:
    build:
      context: ../../chat_app/backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_SQL_INIT_MODE: never
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_URL: "${JAVA_DB_URL}"
      DB_USERNAME: "${JAVA_DB_USERNAME}"
      DB_PASSWORD: "${JAVA_DB_PASSWORD}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_SSL_ENABLED: "${REDIS_SSL_ENABLED:-false}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-localhost}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBITMQ_VIRTUAL_HOST: "${RABBITMQ_VIRTUAL_HOST:-/}"
      JWT_SIGNER_KEY: "${JAVA_JWT_SIGNER_KEY}"
      RESET_TOKEN_SECRET: "${JAVA_RESET_TOKEN_SECRET}"
      READ_MODEL_EVENTS_ENABLED: "${READ_MODEL_EVENTS_ENABLED:-false}"
      READ_MODEL_EVENTS_EXCHANGE: "${READ_MODEL_EXCHANGE:-fookbase.domain.events}"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "${APP_ORIGIN}"
      APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: "${APP_ORIGIN}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
      CLOUDINARY_UPLOAD_PRESET: "${CLOUDINARY_UPLOAD_PRESET:-}"
      CLOUDINARY_UPLOAD_FOLDER: "${CLOUDINARY_UPLOAD_FOLDER:-chat_images}"
    expose:
      - "8080"
    restart: unless-stopped
