name: fookbase-vm2

services:
  java-api:
    build:
      context: ../../chat_app/backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: "8080"
      SPRING_SQL_INIT_MODE: never
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_URL: "${JAVA_DB_URL}"
      DB_USERNAME: "${JAVA_DB_USERNAME}"
      DB_PASSWORD: "${JAVA_DB_PASSWORD}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_USERNAME: "${REDIS_USERNAME:-}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_SSL_ENABLED: "${REDIS_SSL_ENABLED:-false}"
      RABBITMQ_HOST: "${RABBITMQ_HOST:-localhost}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBITMQ_VIRTUAL_HOST: "${RABBITMQ_VIRTUAL_HOST:-/}"
      JWT_SIGNER_KEY: "${JAVA_JWT_SIGNER_KEY}"
      RESET_TOKEN_SECRET: "${JAVA_RESET_TOKEN_SECRET}"
      READ_MODEL_EVENTS_ENABLED: "${READ_MODEL_EVENTS_ENABLED:-false}"
      READ_MODEL_EVENTS_EXCHANGE: "${READ_MODEL_EXCHANGE:-fookbase.domain.events}"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "${APP_ORIGIN}"
      APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: "${APP_ORIGIN}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-}"
      CLOUDINARY_UPLOAD_PRESET: "${CLOUDINARY_UPLOAD_PRESET:-}"
      CLOUDINARY_UPLOAD_FOLDER: "${CLOUDINARY_UPLOAD_FOLDER:-chat_images}"
    ports:
      - "${JAVA_API_PORT:-8080}:8080"
    restart: unless-stopped
