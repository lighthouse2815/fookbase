name: Azure CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_JAVA_API_BASE_URL: ${{ secrets.VITE_JAVA_API_BASE_URL }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend-build-test-publish:
    name: Backend Build Test Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: dotnet restore backend/fookbase.API/fookbase.API.csproj

      - name: Build backend
        run: dotnet build backend/fookbase.API/fookbase.API.csproj --configuration Release --no-restore

      - name: Build backend tests
        run: dotnet build backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Publish backend
        run: dotnet publish backend/fookbase.API/fookbase.API.csproj --configuration Release --no-build --output ${{ github.workspace }}/backend_publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend_publish
          if-no-files-found: error

  deploy-backend-azure:
    name: Deploy Backend To Azure Web App
    runs-on: ubuntu-latest
    needs: backend-build-test-publish
    if: github.event_name != 'pull_request'
    environment:
      name: production
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: backend_publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
          package: backend_publish

  deploy-frontend-azure-blob:
    name: Deploy Frontend To Azure Blob Static Website
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name != 'pull_request'
    environment:
      name: production
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable static website hosting
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob service-properties update \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --static-website \
              --index-document index.html \
              --404-document index.html

      - name: Upload frontend dist to $web
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --destination '$web' \
              --source frontend-dist \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --overwrite
