name: Main CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_vm2_rebuild:
        description: "Force rebuild Java image on VM2"
        required: false
        type: boolean
        default: false
      force_vm1_rebuild:
        description: "Force rebuild gateway and C# images on VM1"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: main-cicd-deploy
  cancel-in-progress: true

jobs:
  deploy-vm2:
    name: Deploy VM2 Java
    runs-on: ubuntu-latest
    env:
      SSH_OPTS: "-o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=20 -o ConnectionAttempts=3 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_SSH_KEY: ${{ secrets.VM2_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM2_HOST:-}" ]; then
            echo "VM2_HOST secret is empty."
            exit 1
          fi
          if [ -z "${VM2_SSH_KEY:-}" ]; then
            echo "VM2_SSH_KEY secret is empty."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VM2_SSH_KEY" | tr -d '\r' > ~/.ssh/vm2_key
          chmod 600 ~/.ssh/vm2_key
          if ! grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' ~/.ssh/vm2_key; then
            echo "VM2_SSH_KEY does not look like a valid private key."
            exit 1
          fi
          touch ~/.ssh/known_hosts
          KEYSCAN_SUCCESS=false
          for attempt in 1 2 3; do
            KEYSCAN_OUTPUT="$(ssh-keyscan -T 15 -t rsa,ecdsa,ed25519 -H "$VM2_HOST" 2>/tmp/vm2_keyscan.err || true)"
            if [ -n "$KEYSCAN_OUTPUT" ]; then
              printf '%s\n' "$KEYSCAN_OUTPUT" >> ~/.ssh/known_hosts
              KEYSCAN_SUCCESS=true
              break
            fi
            echo "ssh-keyscan attempt $attempt failed for VM2_HOST=$VM2_HOST. Retrying in 5s..."
            sleep 5
          done
          if [ "$KEYSCAN_SUCCESS" != "true" ]; then
            echo "Warning: unable to prefetch SSH host key for VM2_HOST=$VM2_HOST."
            echo "Continuing with StrictHostKeyChecking=accept-new."
            cat /tmp/vm2_keyscan.err || true
          fi

      - name: Write VM2 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm2
          ${{ secrets.VM2_ENV_FILE }}
          EOF

      - name: Ensure remote VM2 app directory exists
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh $SSH_OPTS -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "mkdir -p '${VM2_APP_DIR}'"

      - name: Sync repository to VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh $SSH_OPTS -i ~/.ssh/vm2_key" \
            ./ "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/"

      - name: Upload VM2 environment file
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          scp $SSH_OPTS -i ~/.ssh/vm2_key /tmp/.env.vm2 "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/deploy/lightsail/.env.vm2"

      - name: Decide VM2 rebuild mode
        id: vm2_rebuild
        run: |
          FORCE_REBUILD=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_vm2_rebuild }}" = "true" ]; then
            FORCE_REBUILD=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            PREV_SHA='${{ github.event.before }}'
            CURRENT_SHA='${{ github.sha }}'
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$PREV_SHA^{commit}" 2>/dev/null; then
              echo "Previous commit is unavailable in local checkout; using single-commit fallback."
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$CURRENT_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$PREV_SHA" "$CURRENT_SHA")"
            fi
            echo "Changed files:"
            echo "$CHANGED_FILES"
            if echo "$CHANGED_FILES" | grep -Eq '^(chat_app/backend/.*|deploy/lightsail/docker-compose\.vm2\.yml|deploy/lightsail/scripts/redeploy-vm2\.sh|deploy/lightsail/\.env\.vm2\.example)$'; then
              FORCE_REBUILD=true
            fi
          fi
          echo "force_rebuild=$FORCE_REBUILD" >> "$GITHUB_OUTPUT"

      - name: Deploy VM2 stack
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh $SSH_OPTS -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "cd '${VM2_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm2.sh && FORCE_REBUILD=${{ steps.vm2_rebuild.outputs.force_rebuild }} ./scripts/redeploy-vm2.sh"

  deploy-vm1:
    name: Deploy VM1 Gateway and C#
    runs-on: ubuntu-latest
    needs:
      - deploy-vm2
    env:
      SSH_OPTS: "-o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=20 -o ConnectionAttempts=3 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_SSH_KEY: ${{ secrets.VM1_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM1_HOST:-}" ]; then
            echo "VM1_HOST secret is empty."
            exit 1
          fi
          if [ -z "${VM1_SSH_KEY:-}" ]; then
            echo "VM1_SSH_KEY secret is empty."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VM1_SSH_KEY" | tr -d '\r' > ~/.ssh/vm1_key
          chmod 600 ~/.ssh/vm1_key
          if ! grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' ~/.ssh/vm1_key; then
            echo "VM1_SSH_KEY does not look like a valid private key."
            exit 1
          fi
          touch ~/.ssh/known_hosts
          KEYSCAN_SUCCESS=false
          for attempt in 1 2 3; do
            KEYSCAN_OUTPUT="$(ssh-keyscan -T 15 -t rsa,ecdsa,ed25519 -H "$VM1_HOST" 2>/tmp/vm1_keyscan.err || true)"
            if [ -n "$KEYSCAN_OUTPUT" ]; then
              printf '%s\n' "$KEYSCAN_OUTPUT" >> ~/.ssh/known_hosts
              KEYSCAN_SUCCESS=true
              break
            fi
            echo "ssh-keyscan attempt $attempt failed for VM1_HOST=$VM1_HOST. Retrying in 5s..."
            sleep 5
          done
          if [ "$KEYSCAN_SUCCESS" != "true" ]; then
            echo "Warning: unable to prefetch SSH host key for VM1_HOST=$VM1_HOST."
            echo "Continuing with StrictHostKeyChecking=accept-new."
            cat /tmp/vm1_keyscan.err || true
          fi

      - name: Write VM1 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm1
          ${{ secrets.VM1_ENV_FILE }}
          EOF

      - name: Ensure remote VM1 app directory exists
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh $SSH_OPTS -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "mkdir -p '${VM1_APP_DIR}'"

      - name: Sync repository to VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh $SSH_OPTS -i ~/.ssh/vm1_key" \
            ./ "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/"

      - name: Upload VM1 environment file
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          scp $SSH_OPTS -i ~/.ssh/vm1_key /tmp/.env.vm1 "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/deploy/lightsail/.env.vm1"

      - name: Decide VM1 rebuild mode
        id: vm1_rebuild
        run: |
          FORCE_REBUILD=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_vm1_rebuild }}" = "true" ]; then
            FORCE_REBUILD=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            PREV_SHA='${{ github.event.before }}'
            CURRENT_SHA='${{ github.sha }}'
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$PREV_SHA^{commit}" 2>/dev/null; then
              echo "Previous commit is unavailable in local checkout; using single-commit fallback."
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$CURRENT_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$PREV_SHA" "$CURRENT_SHA")"
            fi
            echo "Changed files:"
            echo "$CHANGED_FILES"
            if echo "$CHANGED_FILES" | grep -Eq '^(backend/.*|deploy/lightsail/docker-compose\.vm1\.yml|deploy/lightsail/Dockerfile\.vm1-gateway|deploy/lightsail/nginx\.vm1\.conf\.template|deploy/lightsail/Caddyfile\.vm1|deploy/lightsail/scripts/redeploy-vm1\.sh|deploy/lightsail/\.env\.vm1\.example)$'; then
              FORCE_REBUILD=true
            fi
          fi
          echo "force_rebuild=$FORCE_REBUILD" >> "$GITHUB_OUTPUT"

      - name: Deploy VM1 stack
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh $SSH_OPTS -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "cd '${VM1_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm1.sh && FORCE_REBUILD=${{ steps.vm1_rebuild.outputs.force_rebuild }} ./scripts/redeploy-vm1.sh"
