name: Main CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-cicd-deploy
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://example.com
          VITE_JAVA_API_BASE_URL: https://example.com
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID || '' }}
        run: npm run build

  backend-build-test:
    name: C# Backend Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend and test projects
        run: |
          dotnet restore backend/fookbase.API/fookbase.API.csproj
          dotnet restore backend/fookbase.API.Tests/fookbase.API.Tests.csproj

      - name: Build backend
        run: dotnet build backend/fookbase.API/fookbase.API.csproj --configuration Release --no-restore

      - name: Build backend tests
        run: dotnet build backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-build --verbosity minimal

  java-backend-build-test:
    name: Java Backend Build Test
    runs-on: ubuntu-latest
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/chat_app?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: root
      DB_PASSWORD: 123456
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"
      JWT_SIGNER_KEY: CI_TEST_ONLY_SIGNER_KEY_CHANGE_IN_PROD_123456
      RESET_TOKEN_SECRET: CI_TEST_ONLY_RESET_SECRET_CHANGE_IN_PROD_123456
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: chat_app
          MYSQL_ROOT_PASSWORD: 123456
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: chat_app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Java backend tests
        run: ./mvnw -B test

      - name: Package Java backend
        run: ./mvnw -B package -DskipTests

  deploy-vm2:
    name: Deploy VM2 Java
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build-test
      - java-backend-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_SSH_KEY: ${{ secrets.VM2_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/vm2_key
          ${{ secrets.VM2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/vm2_key
          ssh-keyscan -H "$VM2_HOST" >> ~/.ssh/known_hosts

      - name: Write VM2 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm2
          ${{ secrets.VM2_ENV_FILE }}
          EOF

      - name: Ensure remote VM2 app directory exists
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "mkdir -p '${VM2_APP_DIR}'"

      - name: Sync repository to VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/vm2_key" \
            ./ "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/"

      - name: Upload VM2 environment file
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          scp -i ~/.ssh/vm2_key /tmp/.env.vm2 "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/deploy/lightsail/.env.vm2"

      - name: Deploy VM2 stack
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "cd '${VM2_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm2.sh && ./scripts/redeploy-vm2.sh"

  deploy-vm1:
    name: Deploy VM1 Gateway and C#
    runs-on: ubuntu-latest
    needs:
      - deploy-vm2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_SSH_KEY: ${{ secrets.VM1_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/vm1_key
          ${{ secrets.VM1_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/vm1_key
          ssh-keyscan -H "$VM1_HOST" >> ~/.ssh/known_hosts

      - name: Write VM1 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm1
          ${{ secrets.VM1_ENV_FILE }}
          EOF

      - name: Ensure remote VM1 app directory exists
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "mkdir -p '${VM1_APP_DIR}'"

      - name: Sync repository to VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/vm1_key" \
            ./ "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/"

      - name: Upload VM1 environment file
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          scp -i ~/.ssh/vm1_key /tmp/.env.vm1 "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/deploy/lightsail/.env.vm1"

      - name: Deploy VM1 stack
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "cd '${VM1_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm1.sh && ./scripts/redeploy-vm1.sh"
