name: Main CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_vm2_rebuild:
        description: "Force rebuild Java image on VM2"
        required: false
        type: boolean
        default: false
      force_vm1_rebuild:
        description: "Force rebuild gateway and C# images on VM1"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: main-cicd-deploy
  cancel-in-progress: true

jobs:
  deploy-vm2:
    name: Deploy VM2 Java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_SSH_KEY: ${{ secrets.VM2_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/vm2_key
          ${{ secrets.VM2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/vm2_key
          ssh-keyscan -H "$VM2_HOST" >> ~/.ssh/known_hosts

      - name: Write VM2 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm2
          ${{ secrets.VM2_ENV_FILE }}
          EOF

      - name: Ensure remote VM2 app directory exists
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "mkdir -p '${VM2_APP_DIR}'"

      - name: Sync repository to VM2
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/vm2_key" \
            ./ "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/"

      - name: Upload VM2 environment file
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          scp -i ~/.ssh/vm2_key /tmp/.env.vm2 "${VM2_USERNAME}@${VM2_HOST}:${VM2_APP_DIR}/deploy/lightsail/.env.vm2"

      - name: Decide VM2 rebuild mode
        id: vm2_rebuild
        run: |
          FORCE_REBUILD=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_vm2_rebuild }}" = "true" ]; then
            FORCE_REBUILD=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            PREV_SHA='${{ github.event.before }}'
            CURRENT_SHA='${{ github.sha }}'
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$PREV_SHA^{commit}" 2>/dev/null; then
              echo "Previous commit is unavailable in local checkout; using single-commit fallback."
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$CURRENT_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$PREV_SHA" "$CURRENT_SHA")"
            fi
            echo "Changed files:"
            echo "$CHANGED_FILES"
            if echo "$CHANGED_FILES" | grep -Eq '^(chat_app/backend/.*|deploy/lightsail/docker-compose\.vm2\.yml|deploy/lightsail/scripts/redeploy-vm2\.sh|deploy/lightsail/\.env\.vm2\.example)$'; then
              FORCE_REBUILD=true
            fi
          fi
          echo "force_rebuild=$FORCE_REBUILD" >> "$GITHUB_OUTPUT"

      - name: Deploy VM2 stack
        env:
          VM2_HOST: ${{ secrets.VM2_HOST }}
          VM2_USERNAME: ${{ secrets.VM2_USERNAME }}
          VM2_APP_DIR: ${{ secrets.VM2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm2_key "${VM2_USERNAME}@${VM2_HOST}" "cd '${VM2_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm2.sh && FORCE_REBUILD=${{ steps.vm2_rebuild.outputs.force_rebuild }} ./scripts/redeploy-vm2.sh"

  deploy-vm1:
    name: Deploy VM1 Gateway and C#
    runs-on: ubuntu-latest
    needs:
      - deploy-vm2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH for VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_SSH_KEY: ${{ secrets.VM1_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/vm1_key
          ${{ secrets.VM1_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/vm1_key
          ssh-keyscan -H "$VM1_HOST" >> ~/.ssh/known_hosts

      - name: Write VM1 environment file
        run: |
          cat <<'EOF' > /tmp/.env.vm1
          ${{ secrets.VM1_ENV_FILE }}
          EOF

      - name: Ensure remote VM1 app directory exists
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "mkdir -p '${VM1_APP_DIR}'"

      - name: Sync repository to VM1
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/vm1_key" \
            ./ "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/"

      - name: Upload VM1 environment file
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          scp -i ~/.ssh/vm1_key /tmp/.env.vm1 "${VM1_USERNAME}@${VM1_HOST}:${VM1_APP_DIR}/deploy/lightsail/.env.vm1"

      - name: Decide VM1 rebuild mode
        id: vm1_rebuild
        run: |
          FORCE_REBUILD=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_vm1_rebuild }}" = "true" ]; then
            FORCE_REBUILD=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            PREV_SHA='${{ github.event.before }}'
            CURRENT_SHA='${{ github.sha }}'
            if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$PREV_SHA^{commit}" 2>/dev/null; then
              echo "Previous commit is unavailable in local checkout; using single-commit fallback."
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$CURRENT_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$PREV_SHA" "$CURRENT_SHA")"
            fi
            echo "Changed files:"
            echo "$CHANGED_FILES"
            if echo "$CHANGED_FILES" | grep -Eq '^(backend/.*|deploy/lightsail/docker-compose\.vm1\.yml|deploy/lightsail/Dockerfile\.vm1-gateway|deploy/lightsail/nginx\.vm1\.conf\.template|deploy/lightsail/Caddyfile\.vm1|deploy/lightsail/scripts/redeploy-vm1\.sh|deploy/lightsail/\.env\.vm1\.example)$'; then
              FORCE_REBUILD=true
            fi
          fi
          echo "force_rebuild=$FORCE_REBUILD" >> "$GITHUB_OUTPUT"

      - name: Deploy VM1 stack
        env:
          VM1_HOST: ${{ secrets.VM1_HOST }}
          VM1_USERNAME: ${{ secrets.VM1_USERNAME }}
          VM1_APP_DIR: ${{ secrets.VM1_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vm1_key "${VM1_USERNAME}@${VM1_HOST}" "cd '${VM1_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy-vm1.sh && FORCE_REBUILD=${{ steps.vm1_rebuild.outputs.force_rebuild }} ./scripts/redeploy-vm1.sh"
