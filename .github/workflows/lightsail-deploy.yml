name: Lightsail Deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lightsail-deploy
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://example.com
          VITE_JAVA_API_BASE_URL: https://example.com
          VITE_GOOGLE_WEB_CLIENT_ID: ""
        run: npm run build

  backend-build-test:
    name: Backend Build Test
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend and test projects
        run: |
          dotnet restore backend/fookbase.API/fookbase.API.csproj
          dotnet restore backend/fookbase.API.Tests/fookbase.API.Tests.csproj

      - name: Build backend
        run: dotnet build backend/fookbase.API/fookbase.API.csproj --configuration Release --no-restore

      - name: Build backend tests
        run: dotnet build backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/fookbase.API.Tests/fookbase.API.Tests.csproj --configuration Release --no-build --verbosity minimal

  java-backend-build-test:
    name: Java Backend Build Test
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/chat_app?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
      DB_USERNAME: root
      DB_PASSWORD: 123456
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SIGNER_KEY: CI_TEST_ONLY_SIGNER_KEY_CHANGE_IN_PROD_123456
      RESET_TOKEN_SECRET: CI_TEST_ONLY_RESET_SECRET_CHANGE_IN_PROD_123456
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: chat_app
          MYSQL_ROOT_PASSWORD: 123456
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: chat_app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Java backend tests
        run: ./mvnw -B test

      - name: Package Java backend
        run: ./mvnw -B package -DskipTests

  deploy-to-lightsail:
    name: Deploy To Lightsail
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build-test
      - java-backend-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync and OpenSSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/lightsail_key
          ${{ secrets.LIGHTSAIL_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Write Lightsail environment file
        run: |
          cat <<'EOF' > /tmp/lightsail.env
          ${{ secrets.LIGHTSAIL_ENV_FILE }}
          EOF

      - name: Ensure remote app directory exists
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USERNAME: ${{ secrets.LIGHTSAIL_USERNAME }}
          LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
        run: |
          ssh -i ~/.ssh/lightsail_key "${LIGHTSAIL_USERNAME}@${LIGHTSAIL_HOST}" "mkdir -p '${LIGHTSAIL_APP_DIR}'"

      - name: Sync repository to Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USERNAME: ${{ secrets.LIGHTSAIL_USERNAME }}
          LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/lightsail_key" \
            ./ "${LIGHTSAIL_USERNAME}@${LIGHTSAIL_HOST}:${LIGHTSAIL_APP_DIR}/"

      - name: Upload Lightsail environment file
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USERNAME: ${{ secrets.LIGHTSAIL_USERNAME }}
          LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
        run: |
          scp -i ~/.ssh/lightsail_key /tmp/lightsail.env "${LIGHTSAIL_USERNAME}@${LIGHTSAIL_HOST}:${LIGHTSAIL_APP_DIR}/deploy/lightsail/.env"

      - name: Deploy stack on Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USERNAME: ${{ secrets.LIGHTSAIL_USERNAME }}
          LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
        run: |
          ssh -i ~/.ssh/lightsail_key "${LIGHTSAIL_USERNAME}@${LIGHTSAIL_HOST}" "cd '${LIGHTSAIL_APP_DIR}/deploy/lightsail' && chmod +x scripts/redeploy.sh && ./scripts/redeploy.sh"
